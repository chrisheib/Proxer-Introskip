<!DOCTYPE html>
<html>

<head>
    <title>Proxer Skip Einstellungen</title>
    <style>
        body {
            width: 300px;
            padding: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 5px 0;
        }

        .framehash-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .framehash-value {
            max-width: 190px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: monospace;
        }

        .remove-hash-btn {
            font-size: 12px;
            padding: 2px 6px;
            cursor: pointer;
        }

        #framehash-context {
            margin: 6px 0;
            font-size: 12px;
            color: #333;
        }

        #framehash-preview {
            position: fixed;
            display: none;
            z-index: 9999;
            pointer-events: none;
            border: 1px solid #999;
            background: #111;
            padding: 3px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        }

        #framehash-preview img {
            display: block;
            width: 120px;
            height: auto;
            max-height: 68px;
            object-fit: cover;
        }

        input {
            width: 50px;
        }

        .global-setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 6px 0;
            gap: 8px;
        }

        .global-setting-row input {
            width: 70px;
        }

        .global-setting-row input[type="checkbox"] {
            width: auto;
        }
    </style>
</head>

<body>
    <!-- <h3>Episode Skip Times</h3>
    <ul id="episodes-list"></ul>
    <hr> -->
    <h3>Serien Skipframes</h3>
    <p id="framehash-context">Öffne eine Episode, um Frame-Hashes zu verwalten.</p>
    <ul id="framehash-list"></ul>
    <div id="framehash-preview">
        <img id="framehash-preview-image" alt="Frame hash preview">
    </div>
    <hr>
    <h3>Globale Skipframe-Einstellungen</h3>
    <div class="global-setting-row">
        <label for="global-threshold-input">Schwellenwert</label>
        <input id="global-threshold-input" type="number" min="0" step="1">
    </div>
    <div class="global-setting-row">
        <label for="global-duration-input">Dauer (Sekunden)</label>
        <input id="global-duration-input" type="number" min="0" step="1">
    </div>
    <div class="global-setting-row">
        <label for="global-refresh-input">Aktualisierung (ms)</label>
        <input id="global-refresh-input" type="number" min="10" step="1">
    </div>
    <div class="global-setting-row">
        <label for="global-sound-fade-toggle">Sound Fade bei Skip</label>
        <input id="global-sound-fade-toggle" type="checkbox">
    </div>
    <div class="global-setting-row">
        <label for="auto-mirror-toggle">Automatisch auf roten Proxer-Player wechseln</label>
        <input type="checkbox" id="auto-mirror-toggle">
    </div>
    <hr>
    <script src="dist/popup.js"></script>
</body>

</html>
