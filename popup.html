<!DOCTYPE html>
<html>

<head>
    <title>Proxer Skip Settings</title>
    <style>
        body {
            width: 300px;
            padding: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 5px 0;
        }

        .framehash-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .framehash-value {
            max-width: 190px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: monospace;
        }

        .remove-hash-btn {
            font-size: 12px;
            padding: 2px 6px;
            cursor: pointer;
        }

        #framehash-context {
            margin: 6px 0;
            font-size: 12px;
            color: #333;
        }

        #framehash-preview {
            position: fixed;
            display: none;
            z-index: 9999;
            pointer-events: none;
            border: 1px solid #999;
            background: #111;
            padding: 3px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        }

        #framehash-preview img {
            display: block;
            width: 120px;
            height: auto;
            max-height: 68px;
            object-fit: cover;
        }

        input {
            width: 50px;
        }
    </style>
</head>

<body>
    <h3>Episode Skip Times</h3>
    <ul id="episodes-list"></ul>
    <hr>
    <h3>Series Frame Hashes</h3>
    <p id="framehash-context">Open a watch page to manage frame hashes.</p>
    <ul id="framehash-list"></ul>
    <div id="framehash-preview">
        <img id="framehash-preview-image" alt="Frame hash preview">
    </div>
    <hr>
    <label>
        <input type="checkbox" id="auto-mirror-toggle"> Auto-select Proxer-Stream mirror
    </label>
    <script src="dist/popup.js"></script>
</body>

</html>
